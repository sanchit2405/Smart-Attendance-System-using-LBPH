<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Attendance — Faculty</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f172a;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .topbar {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-pill {
            background: #059669;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.55;
            }
        }

        .topbar h2 {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .topbar-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: opacity 0.15s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-back {
            background: #334155;
            color: #cbd5e1;
        }

        .btn-stop {
            background: #dc2626;
            color: #fff;
        }

        /* ── Main layout: camera left, list right on wide screens ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0;
            overflow: hidden;
        }

        /* Camera takes full width and as much height as available */
        .camera-wrap {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .camera-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Student list panel sits at the bottom */
        .list-panel {
            background: #1e293b;
            border-top: 1px solid #334155;
            flex-shrink: 0;
            max-height: 240px;
            overflow-y: auto;
            padding: 0 16px;
        }

        .list-header {
            position: sticky;
            top: 0;
            background: #1e293b;
            padding: 12px 0 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #334155;
            z-index: 2;
        }

        .list-header span.title {
            font-size: 13px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .count-badge {
            background: #0ea5e9;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 1px 8px;
            border-radius: 12px;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #10b981;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        .rec-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #2d3a4a;
        }

        .rec-item:last-child {
            border-bottom: none;
        }

        .rec-name {
            font-size: 14px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .rec-roll {
            font-size: 11px;
            color: #64748b;
            margin-top: 2px;
        }

        .rec-time {
            font-size: 13px;
            font-weight: 600;
            color: #10b981;
            white-space: nowrap;
        }

        .rec-empty {
            text-align: center;
            color: #475569;
            padding: 24px 0;
            font-size: 13px;
        }

        /* Wide-screen: camera left 65%, list right 35% */
        @media (min-width: 900px) {
            .main {
                flex-direction: row;
            }

            .camera-wrap {
                flex: 65;
                height: calc(100vh - 53px);
            }

            .list-panel {
                flex: 35;
                max-height: none;
                height: calc(100vh - 53px);
                border-top: none;
                border-left: 1px solid #334155;
            }
        }
    </style>
</head>

<body>

    <!-- Top bar -->
    <div class="topbar">
        <div class="topbar-left">
            <span class="material-icons-round" style="color:#0ea5e9;">videocam</span>
            <h2>Live Attendance</h2>
            <span class="live-pill">LIVE</span>
        </div>
        <div class="topbar-right">
            <a href="/faculty_dashboard" class="btn btn-back">
                <span class="material-icons-round" style="font-size:16px;">arrow_back</span>
                Dashboard
            </a>
            <button id="stopBtn" class="btn btn-stop">
                <span class="material-icons-round" style="font-size:16px;">stop_circle</span>
                End Session
            </button>
        </div>
    </div>

    <!-- Main area -->
    <div class="main">

        <!-- Full camera -->
        <div class="camera-wrap">
            <img src="/video_feed" alt="Live Camera">
        </div>

        <!-- Student list -->
        <div class="list-panel">
            <div class="list-header">
                <span class="live-dot"></span>
                <span class="title">Recognized Students</span>
                <span class="count-badge" id="countBadge">0</span>
            </div>
            <div id="studentList">
                <p class="rec-empty">Waiting for detections…</p>
            </div>
        </div>

    </div>

    <script>
        // End session button
        document.getElementById('stopBtn').addEventListener('click', async () => {
            const ok = confirm('End the current attendance session?');
            if (!ok) return;
            await fetch('/stop_session', { method: 'POST' });
            window.location.href = '/faculty_dashboard';
        });

        // Live student list polling
        async function refresh() {
            try {
                const res = await fetch('/recognized_today?_=' + Date.now());
                if (!res.ok) return;
                const data = await res.json();

                document.getElementById('countBadge').textContent = data.length;

                const list = document.getElementById('studentList');
                if (data.length === 0) {
                    list.innerHTML = '<p class="rec-empty">No students detected yet.</p>';
                } else {
                    list.innerHTML = data.map(s => `
                    <div class="rec-item">
                        <div>
                            <div class="rec-name">${s.name}</div>
                            <div class="rec-roll">${s.roll_number}</div>
                        </div>
                        <div class="rec-time">${s.time}</div>
                    </div>
                `).join('');
                }
            } catch (_) { }
        }

        refresh();
        setInterval(refresh, 1500);
    </script>

</body>

</html>
